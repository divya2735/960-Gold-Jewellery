<style>
/* ===== Admin Login (Gold + Silver Luxury Theme) ===== */
.admin-login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 90vh;
    background: linear-gradient(135deg, #FFF7D1, #E5E4E2); /* Gold → Silver */
    font-family: 'Poppins', sans-serif;
}

/* Card Box */
.admin-login-box {
    width: 100%;
    max-width: 420px;
    background: #ffffffcc; /* light glass effect */
    backdrop-filter: blur(6px);
    border: 2px solid #D4AF37; /* Pure Gold */
    border-radius: 22px;
    box-shadow: 0px 10px 28px rgba(212,175,55,0.22);
    padding: 40px 35px;
    text-align: center;
    animation: fadeIn 0.7s ease-in-out;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-18px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Logo Title */
.admin-logo {
    font-size: 30px;
    font-weight: 700;
    color: #D4AF37; /* Gold */
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-shadow: 0px 0px 8px rgba(212,175,55,0.5);
}

.admin-subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 25px;
}

/* Input Fields */
.input-field {
    text-align: left;
    margin-bottom: 18px;
}

.input-field label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #6e5b13; /* Deep soft gold */
}

.input-field input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #c0b68a; /* light gold border */
    border-radius: 10px;
    outline: none;
    font-size: 15px;
    background: #fffdf5;
    transition: all 0.3s ease;
}

.input-field input:focus {
    border-color: #D4AF37;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
}

/* Gold Button */
.btn-admin-login {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: bold;
    color: #6e5200; /* deep gold brown */
    background: linear-gradient(135deg, #FFD700, #FFE57F); /* gold shine */
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0px 6px 16px rgba(255,215,0,0.45);
}

.btn-admin-login:hover {
    background: linear-gradient(135deg, #FFE57F, #FFECB3);
    transform: scale(1.03);
}

/* Back link */
.back-link {
    margin-top: 15px;
    display: inline-block;
    font-size: 14px;
    color: #D4AF37;
    text-decoration: none;
    font-weight: 600;
}
.back-link:hover {
    text-decoration: underline;
}
</style>

<div class="admin-login-container">
    <div class="admin-login-box">
        <div class="admin-logo">Admin Login</div>
        <div class="admin-subtitle">Enter your credentials to access the dashboard</div>

        <form method="post">
            {% csrf_token %}
            <div class="input-field">
                <label for="admin-username">Username</label>
                <input type="text" name="username" id="admin-username" placeholder="Enter admin username" required>
            </div>

            <div class="input-field">
                <label for="admin-password">Password</label>
                <input type="password" name="password" id="admin-password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-admin-login">Login</button>
        </form>

    </div>
</div>

{% if message %}
<script>alert("{{message}}")</script>
{% endif %}

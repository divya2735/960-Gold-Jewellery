{% extends 'common.html' %}
{% block content %}
{% load static %}

<style>
    /* ═════════════════════════════════════════════════════
       CHANGE PASSWORD PAGE — GOLD JEWELLERY THEME
       ═════════════════════════════════════════════════════ */

    .cp-wrapper {
        min-height: 75vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 15px;
    }

    .cp-card {
        background: #fff;
        border: 1.5px solid #f2e6c7;
        border-radius: 16px;
        box-shadow: 0 8px 40px rgba(212, 175, 55, 0.12);
        max-width: 500px;
        width: 100%;
        overflow: hidden;
        animation: cpFadeIn 0.5s ease;
    }

    @keyframes cpFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Gold Header Strip */
    .cp-header {
        background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
        padding: 30px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .cp-header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
        animation: headerShine 3s infinite;
    }

    @keyframes headerShine {
        0% { transform: translate(-100%, -100%) rotate(0deg); }
        100% { transform: translate(100%, 100%) rotate(45deg); }
    }

    .cp-header-icon {
        width: 60px;
        height: 60px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #fff;
        margin-bottom: 12px;
        backdrop-filter: blur(5px);
        border: 2px solid rgba(255,255,255,0.3);
    }

    .cp-header h2 {
        color: #fff;
        font-weight: 700;
        font-size: 1.6rem;
        margin: 0;
        position: relative;
    }

    .cp-header p {
        color: rgba(255,255,255,0.85);
        font-size: 0.9rem;
        margin: 8px 0 0;
        position: relative;
    }

    /* Form Body */
    .cp-body {
        padding: 30px;
    }

    .cp-input-group {
        margin-bottom: 22px;
    }

    .cp-input-group label {
        display: block;
        font-weight: 600;
        color: #555;
        margin-bottom: 6px;
        font-size: 0.95rem;
    }

    .cp-input-group label i {
        color: #d4af37;
        margin-right: 6px;
    }

    .cp-input-wrapper {
        position: relative;
    }

    .cp-input-wrapper input {
        width: 100%;
        padding: 12px 45px 12px 16px;
        border: 1.5px solid #e8dcc8;
        border-radius: 10px;
        font-size: 1rem;
        font-family: 'Poppins', sans-serif;
        background: #fffdf8;
        color: #333;
        transition: all 0.3s ease;
        outline: none;
    }

    .cp-input-wrapper input:focus {
        border-color: #d4af37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        background: #fff;
    }

    .cp-input-wrapper input::placeholder {
        color: #bbb;
    }

    .cp-eye-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #c59a4a;
        font-size: 18px;
        transition: color 0.2s;
        background: none;
        border: none;
        padding: 0;
    }

    .cp-eye-toggle:hover {
        color: #d4af37;
    }

    /* Strength Bar */
    .cp-strength-bar-track {
        height: 5px;
        width: 100%;
        background: #eee;
        border-radius: 10px;
        margin-top: 10px;
        overflow: hidden;
    }

    .cp-strength-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 10px;
        transition: width 0.4s ease, background 0.4s ease;
    }

    .cp-strength-text {
        font-size: 0.8rem;
        margin-top: 5px;
        font-weight: 600;
    }

    /* Submit Button */
    .cp-submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #d4af37, #b8860b);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1.05rem;
        font-weight: 700;
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
    }

    .cp-submit-btn::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: transform 0.5s;
        transform: translateX(-100%);
    }

    .cp-submit-btn:hover::before {
        transform: translateX(100%);
    }

    .cp-submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }

    .cp-submit-btn:active {
        transform: scale(0.98);
    }

    /* Message Alert */
    .cp-alert {
        margin-top: 18px;
        padding: 12px 18px;
        border-radius: 10px;
        text-align: center;
        font-weight: 600;
        font-size: 0.95rem;
        animation: cpFadeIn 0.3s ease;
    }

    .cp-alert-success {
        background: rgba(212, 175, 55, 0.1);
        color: #b8860b;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .cp-alert-error {
        background: rgba(231, 76, 60, 0.08);
        color: #c0392b;
        border: 1px solid rgba(231, 76, 60, 0.2);
    }

    /* Responsive */
    @media (max-width: 576px) {
        .cp-header {
            padding: 22px;
        }
        .cp-header h2 {
            font-size: 1.3rem;
        }
        .cp-body {
            padding: 22px;
        }
    }
</style>

<div class="cp-wrapper">
    <div class="cp-card">

        <!-- Gold Header -->
        <div class="cp-header">
            <div class="cp-header-icon">
                <i class="fas fa-key"></i>
            </div>
            <h2>Change Password</h2>
            <p>Keep your account secure by updating your password regularly.</p>
        </div>

        <!-- Form Body -->
        <div class="cp-body">
            <form method="post">
                {% csrf_token %}

                <!-- Old Password -->
                <div class="cp-input-group">
                    <label><i class="fas fa-lock"></i> Old Password</label>
                    <div class="cp-input-wrapper">
                        <input type="password" name="oldpass" id="oldpass" placeholder="Enter your current password" required>
                        <button type="button" class="cp-eye-toggle" onclick="togglePassword('oldpass', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- New Password -->
                <div class="cp-input-group">
                    <label><i class="fas fa-shield-alt"></i> New Password</label>
                    <div class="cp-input-wrapper">
                        <input type="password" name="newpass" id="newpass" placeholder="Enter new password" oninput="checkStrength(this.value)" required>
                        <button type="button" class="cp-eye-toggle" onclick="togglePassword('newpass', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="cp-strength-bar-track">
                        <div class="cp-strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <p class="cp-strength-text" id="strengthText"></p>
                </div>

                <!-- Confirm New Password -->
                <div class="cp-input-group">
                    <label><i class="fas fa-check-circle"></i> Confirm New Password</label>
                    <div class="cp-input-wrapper">
                        <input type="password" name="newpass1" id="newpass1" placeholder="Re-enter new password" required>
                        <button type="button" class="cp-eye-toggle" onclick="togglePassword('newpass1', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="cp-submit-btn">
                    <i class="fas fa-sync-alt"></i> &nbsp; Update Password
                </button>
            </form>

            {% if message %}
            <div class="cp-alert {% if 'updated' in message or 'Updated' in message %}cp-alert-success{% else %}cp-alert-error{% endif %}">
                {% if 'updated' in message or 'Updated' in message %}
                    <i class="fas fa-check-circle"></i>
                {% else %}
                    <i class="fas fa-exclamation-triangle"></i>
                {% endif %}
                {{ message }}
            </div>
            {% endif %}
        </div>

    </div>
</div>

<!-- Scripts -->
<script>
function togglePassword(id, btn) {
    let input = document.getElementById(id);
    let icon = btn.querySelector('i');
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

function checkStrength(password) {
    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");
    let strength = 0;

    if (password.length >= 6) strength++;
    if (password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^A-Za-z0-9]/)) strength++;

    const widths = ["0%", "25%", "50%", "75%", "100%"];
    const colors = ["#ccc", "#e74c3c", "#f39c12", "#2ecc71", "#27ae60"];
    const labels = ["", "Weak 😟", "Fair 😐", "Good 👍", "Strong 💪"];

    bar.style.width = widths[strength];
    bar.style.background = colors[strength];
    text.textContent = labels[strength];
    text.style.color = colors[strength];
}
</script>

{% endblock %}
